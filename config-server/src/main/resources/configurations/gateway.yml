
# Eureka client configuration
eureka:
  client:
    register-with_eureka: false

# Server configuration
server:
  port: 8222
  
  
# Spring Cloud Gateway configuration
spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      # Route definitions
      routes:
        - id: students
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/students/**
            
        - id: schools
          uri: http://localhost:8070
          predicates:
            - Path=/api/v1/schools/**

      